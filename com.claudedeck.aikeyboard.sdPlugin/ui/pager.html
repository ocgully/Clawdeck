<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="Direction">
      <sdpi-select setting="direction" default-value="next">
        <option value="next">Next page (put on top-right)</option>
        <option value="prev">Previous page (put on bottom-right)</option>
      </sdpi-select>
    </sdpi-item>
    <sdpi-item>
      <sdpi-info>
        Place one Next and one Prev key to flip through your virtual dashboard
        pages. Their borders glow with the color of your most urgent session.
      </sdpi-info>
    </sdpi-item>
  </body>
</html>
